name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================== Backend ====================
  backend:
    name: Backend (lint · type-check · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type-check (mypy)
        run: mypy app

      - name: Alembic migrations
        env:
          SECRET_KEY: ci-secret-key-with-enough-length-to-pass-validation
          APP_ENV: local
          SYNC_DATABASE_URL: sqlite:///./alembic_ci.db
        run: alembic upgrade head

      - name: Test (pytest)
        env:
          SECRET_KEY: ci-secret-key-with-enough-length-to-pass-validation
          APP_ENV: local
          DATABASE_URL: ""
          MISTRAL_API_KEY: ci-dummy
          GEMINI_API_KEY: ci-dummy
        run: pytest -q --cov=app --cov-report=term-missing

  # ==================== Frontend ====================
  frontend:
    name: Frontend (lint · type-check · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build
        env:
          NEXT_PUBLIC_APP_NAME: TechMentor AI
        run: npm run build

  # ==================== Docker build smoke ====================
  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t techmentor-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t techmentor-frontend:ci ./frontend
