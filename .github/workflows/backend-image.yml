# Build backend image on GitHub (rapide) - EC2 pull au lieu de compiler sur place.
name: Backend image

on:
  push:
    branches: [main, master]
    paths:
      - "backend/**"
      - ".github/workflows/backend-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/jerico05/techmentor-ai-backend:main
            ghcr.io/jerico05/techmentor-ai-backend:latest
