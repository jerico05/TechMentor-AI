# TechMentor AI - production (EC2 / VPS)
#
# Prerequis : Docker Compose v2, backend/.env (voir backend/.env.production.example)
# Base Neon : DATABASE_URL dans backend/.env (pas de conteneur postgres)
#
# --- Commandes (depuis la racine du repo) ---
#
# Demarrer / redemarrer (rapide, ~30s si image deja construite) :
#   docker compose --env-file backend/.env -f docker-compose.prod.yml up -d
#
# Premier deploy ou apres changement du code backend :
#   docker compose --env-file backend/.env -f docker-compose.prod.yml up -d --build backend
#
# Firebase via fichier sur le serveur :
#   docker compose --env-file backend/.env \
#     -f docker-compose.prod.yml -f docker-compose.prod.firebase-file.yml up -d
#
# Build sur votre PC puis transfert EC2 (evite la compilation lente sur petit EC2) :
#   docker compose -f docker-compose.prod.yml build backend
#   docker save techmentor-backend:prod | gzip > tm-backend.tar.gz
#   scp tm-backend.tar.gz ubuntu@VOTRE_IP:~/
#   gunzip -c tm-backend.tar.gz | docker load
#   docker compose --env-file backend/.env -f docker-compose.prod.yml up -d
#
# Verifier : curl http://localhost:8000/health/ready
# Logs     : docker compose --env-file backend/.env -f docker-compose.prod.yml logs -f backend
# Frontend : deploye sur Vercel (pas sur EC2)

name: techmentor-prod

services:
  postgres:
    profiles: ["local-db"]
    image: postgres:16-alpine
    container_name: tm-prod-postgres
    restart: unless-stopped
    pull_policy: if_not_present
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-techmentor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definir POSTGRES_PASSWORD dans backend/.env}
      POSTGRES_DB: ${POSTGRES_DB:-techmentor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tm_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-techmentor} -d ${POSTGRES_DB:-techmentor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tm-prod-redis
    restart: unless-stopped
    pull_policy: if_not_present
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - tm_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    profiles: ["local-qdrant"]
    image: qdrant/qdrant:v1.12.4
    container_name: tm-prod-qdrant
    restart: unless-stopped
    pull_policy: if_not_present
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - tm_internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: techmentor-backend:prod
    pull_policy: never
    container_name: tm-prod-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      RUN_MIGRATIONS: "1"
      CV_USE_CELERY: "true"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_started
    networks:
      - tm_internal
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "1",
        "--proxy-headers",
        "--forwarded-allow-ips",
        "*",
      ]

  worker:
    image: techmentor-backend:prod
    pull_policy: never
    container_name: tm-prod-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      RUN_MIGRATIONS: "0"
      CV_USE_CELERY: "true"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - tm_internal
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=1",
      ]

networks:
  tm_internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  backend_uploads:
